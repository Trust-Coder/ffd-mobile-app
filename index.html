<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f6fb" />

    <!-- No-flash bootstrap: resolve the persisted theme override (or the OS
         preference for 'system') AND the chosen colour palette, and set
         data-theme + data-palette BEFORE the stylesheet loads, so first paint
         matches. Reads the @capacitor/preferences web backing keys. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('CapacitorStorage.ffd.theme')
          var mode = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system'
          var resolved =
            mode === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : mode
          var p = localStorage.getItem('CapacitorStorage.ffd.palette')
          var palette = p === 'a' || p === 'b' || p === 'c' ? p : 'b'
          var root = document.documentElement
          root.dataset.theme = resolved
          root.dataset.palette = palette
          var surface = {
            a: { light: '#f4f2ee', dark: '#0c1417' },
            b: { light: '#f4f6fb', dark: '#070b18' },
            c: { light: '#eef1f5', dark: '#0a0e14' },
          }
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', surface[palette][resolved])
        } catch (e) {
          document.documentElement.dataset.theme = 'light'
          document.documentElement.dataset.palette = 'b'
        }
      })()
    </script>

    <!-- Web fonts: Sora (display) · Inter (sans) · IBM Plex Mono (numeric). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />

    <title>FFD Flood</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
